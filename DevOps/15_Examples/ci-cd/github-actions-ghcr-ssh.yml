name: build-and-deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - run: |
          IMAGE="ghcr.io/${{ github.repository }}/app:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf "%s" "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "cd /opt/app && docker compose pull && docker compose up -d"
